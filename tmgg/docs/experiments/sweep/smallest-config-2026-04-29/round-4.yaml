# Round 4 — pivot from coordinate-descent to bracket-narrow around
# Shervin's known-pass small config (~300k params, sbm_acc claim per his
# 2026-04-30 message).
#
# Round 3 verdict: L6 reseed (seed=1) hit sbm_acc=0.6875 @ 100k vs round-2
# L6 (seed=0) at 0.5625 @ 44k early-close — both within +/-0.15 abs
# noise floor and both beat the L8 anchor at every matched step. L6 is
# CONFIRMED locked. dim_ffy cuts (128 and 64) on L6 both regressed to
# ~0.45 sbm_acc (~0.18 below L6 baseline, just outside noise floor) but
# this finding is SUPERSEDED by Shervin's evidence: he reports a working
# config that keeps dim_ffy=256 while slashing dx/de/dy/dim_ffX/dim_ffE
# 4-32x. The dim_ffy regression on our R3 base was a coord-descent
# artifact: cutting one axis on an over-parameterized base behaves
# differently than cutting the same axis on a tightly-parameterized base.
#
# Search reframe: bracket-narrow around Shervin's reference instead of
# coord-descent on pre-ranked axes. Per-round invariant: include >=1
# config we expect to fail, to keep the bracket tight.
#
# Round 4 launches all 3 pods on Shervin's base. Pod A reproduces exact;
# Pods B and C probe BELOW Shervin on orthogonal axes (dim_ffy and
# joint dx/dim_ffX). All pods drop async-eval (untrustworthy per
# documented divergence; relying on in-band val_check_interval = 10k
# trustworthy data points across 100k step cap).
#
# Cost-savers vs round 3:
#   - No async-eval (saves ~3h per pod; removes async-eval scheduling).
#   - n_layers=6 baked into all pods (don't re-test n_layers axis).

session_tag: round-4-bracket-narrow-around-shervin
round: 4

launches:
  # Pod A: Shervin's exact config. Positive-control reproduction under
  # our eval pipeline + threshold rule. Seed=0 deliberate (matches
  # round-2 L6 seed for matched-step compare). step_cap=100k matches
  # round 3 (Shervin's snippet implies ~550k but we want apples-to-
  # apples with our prior pods first).
  - dataset: spectre_sbm
    axis_changed: shervin_base
    axis_value: "exact"
    seed: 0
    step_cap: 100000
    overrides:
      trainer.max_steps: 100000
      model.model.n_layers: 6
      model.model.hidden_dims.dx: 64
      model.model.hidden_dims.de: 8
      model.model.hidden_dims.dy: 8
      model.model.hidden_dims.n_head: 8
      model.model.hidden_dims.dim_ffX: 64
      model.model.hidden_dims.dim_ffE: 8
      model.model.hidden_dims.dim_ffy: 256

  # Pod B: Pod A + dim_ffy 256 -> 32. Shervin kept dim_ffy=256 with
  # everything else slashed; this probes whether that choice was
  # load-bearing. Compute change is ~0% (dim_ffy operates on 1
  # vector per graph). Pure param-count probe. Hypothesis: passes
  # easily and dim_ffy is irrelevant in the small regime.
  - dataset: spectre_sbm
    axis_changed: shervin_dim_ffy
    axis_value: 32
    seed: 0
    step_cap: 100000
    overrides:
      trainer.max_steps: 100000
      model.model.n_layers: 6
      model.model.hidden_dims.dx: 64
      model.model.hidden_dims.de: 8
      model.model.hidden_dims.dy: 8
      model.model.hidden_dims.n_head: 8
      model.model.hidden_dims.dim_ffX: 64
      model.model.hidden_dims.dim_ffE: 8
      model.model.hidden_dims.dim_ffy: 32

  # Pod C: Pod A + joint halving of dx (64->32) and dim_ffX (64->32).
  # Quadratic-ish node-side cut: attention QKV proj is 4x cut (scales
  # as dx^2), node FFN is 4x cut (scales as dx*dim_ffX), edge attention
  # is 2x cut (linear in dx). Edge-side untouched (Shervin's de=dim_ffE=8
  # already minimal). Hypothesis: this is the lower-bracket probe;
  # plausibly fails because dx=32 may be too small for SBM block
  # discrimination (2 communities * noise-level encoding).
  - dataset: spectre_sbm
    axis_changed: shervin_dx_dim_ffX
    axis_value: "32_32"
    seed: 0
    step_cap: 100000
    overrides:
      trainer.max_steps: 100000
      model.model.n_layers: 6
      model.model.hidden_dims.dx: 32
      model.model.hidden_dims.de: 8
      model.model.hidden_dims.dy: 8
      model.model.hidden_dims.n_head: 8
      model.model.hidden_dims.dim_ffX: 32
      model.model.hidden_dims.dim_ffE: 8
      model.model.hidden_dims.dim_ffy: 256

# Disconfirming-config fallback:
#   - Pod A is the keystone. If Pod A FAILS to reproduce Shervin's
#     pass claim (sbm_acc < anchor by more than noise floor), we have
#     a reproduction problem -- investigate eval-pipeline differences
#     vs Shervin's setup before round 5.
#   - If Pod A passes and BOTH B and C fail: Shervin's config sits at
#     the exact boundary; round 5 narrows by midpoint between Shervin
#     and the failed cuts.
#   - If Pod A passes and B passes but C fails: dim_ffy is irrelevant,
#     dx is the active constraint. Round 5 probes dx=48 (midpoint)
#     and locks dim_ffy at 32.
#   - If Pod A passes and ALL of B and C pass: aggressive next round,
#     joint dx=32 + dim_ffy=32 + n_layers=4 simultaneously.
