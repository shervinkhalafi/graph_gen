# MLP baseline denoiser
# flatten -> MLP -> reshape
# Ignores graph structure but should learn if training works

_target_: tmgg.experiments._shared_utils.lightning_modules.denoising_module.SingleStepDenoisingModule

model_type: mlp

model_config:
  # Maximum nodes (determines flatten dimension)
  max_nodes: 200
  # MLP architecture
  hidden_dim: 256
  num_layers: 2

# Optimizer settings
learning_rate: ${learning_rate}
weight_decay: ${weight_decay}
optimizer_type: ${optimizer_type}

# Scheduler
scheduler_config: ${scheduler_config}

# Noise settings
noise_type: ${noise_type}
noise_levels: ${noise_levels}
eval_noise_levels: ${eval_noise_levels}

# Loss
loss_type: ${loss_type}
