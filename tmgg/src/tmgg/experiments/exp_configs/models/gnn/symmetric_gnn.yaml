# Symmetric GNN model configuration

_target_: tmgg.training.lightning_modules.denoising_module.SingleStepDenoisingModule

model_name: "gnn_sym"

model:
  _target_: tmgg.models.gnn.GNNSymmetric
  num_layers: 1
  num_terms: 4
  feature_dim_in: 20
  feature_dim_out: 20

# Training parameters
learning_rate: ${learning_rate}
loss_type: ${loss_type}
weight_decay: ${weight_decay}
optimizer_type: ${optimizer_type}
scheduler_config: ${scheduler_config}
rotation_k: 20

# Noise settings
noise_type: ${noise_type}
noise_levels: ${noise_levels}
eval_noise_levels: ${eval_noise_levels}
seed: ${seed}
