# DiGress-style SBM configuration for discrete diffusion generation
#
# Architecture: matches the upstream SBM hidden sizes
#   (8 layers, dx=256, n_head=8, dim_ffX=256, dim_ffE=64, dim_ffy=256)
# Optimizer: matches the upstream AdamW settings
#   (LR=0.0002, weight_decay=1e-12, amsgrad=true)
# Note: the full upstream training setup still needs CLI overrides for the
# diffusion horizon, extra features, and step-based training schedule.
# Reference: https://github.com/cvignac/DiGress/blob/main/configs/experiment/sbm.yaml

_target_: tmgg.training.lightning_modules.diffusion_module.DiffusionModule

model_name: graph_transformer
model:
  _target_: tmgg.models.digress.transformer_model.GraphTransformer
  n_layers: 8
  input_dims: { X: 2, E: 2, y: 0 }   # y=0 because use_timestep adds +1 internally
  hidden_mlp_dims: { X: 128, E: 64, y: 128 }
  use_timestep: true
  hidden_dims:
    dx: 256
    de: 64
    dy: 64
    n_head: 8
    dim_ffX: 256
    dim_ffE: 64
    dim_ffy: 256
  output_dims: { X: 2, E: 2, y: 0 }
  # Wave 7/8 architecture contract: split-field output dims. DiGress is
  # categorical by construction — class widths match ``output_dims``;
  # _feat fields are null. ``edge_source`` is not used by GraphTransformer.
  output_dims_x_class: 2
  output_dims_x_feat: null
  output_dims_e_class: 2
  output_dims_e_feat: null
  # Parity #42 / D-11: any future ``extra_features`` block needing
  # ``max_n_nodes`` (e.g. ``ExtraFeatures(extra_features_type="all",
  # max_n_nodes=...)``) MUST interpolate it from
  # ``${data.num_nodes_max_static}`` instead of hardcoding a literal.
  # Each data preset under ``configs/data/`` exposes
  # ``num_nodes_max_static`` as a safe upper bound chosen at design
  # time; this prevents silent breakage when the same model config
  # is paired with a larger-graph dataset (e.g. SPECTRE n up to 187).

noise_process:
  _target_: tmgg.diffusion.noise_process.CategoricalNoiseProcess
  limit_distribution: empirical_marginal
  schedule: ${model.noise_schedule}
  x_classes: 2
  e_classes: 2

sampler:
  _target_: tmgg.diffusion.sampler.CategoricalSampler

noise_schedule:
  _target_: tmgg.diffusion.schedule.NoiseSchedule
  schedule_type: cosine_iddpm
  timesteps: 1000  # Upstream SBM default (configs/experiment/sbm.yaml:21)

evaluator:
  _target_: tmgg.evaluation.graph_evaluator.GraphEvaluator
  # Match upstream DiGress's ``samples_to_generate = 40`` for SBM
  # evaluation. Use a larger value only when running a custom eval
  # budget (cost scales roughly linearly with this number because
  # sampling dominates validation time).
  eval_num_samples: 40
  # Pull SBM parameters from the data config's ``eval_meta`` block so
  # the Wald-test denominator uses the same ``p_intra`` / ``p_inter``
  # the training graphs were drawn from. Each dataset config (synthetic
  # or SPECTRE) exposes an ``eval_meta`` node; see
  # ``configs/data/spectre_sbm.yaml`` for an example.
  p_intra: ${data.eval_meta.p_intra}
  p_inter: ${data.eval_meta.p_inter}
  # Upstream DiGress uses ``sigma = 0.1`` for the clustering-coefficient
  # kernel with ``gaussian_tv``. Fixed here so clustering MMD values
  # are numerically comparable to published DiGress results.
  clustering_sigma: 0.1

loss_type: cross_entropy
lambda_E: 5.0

# Upstream optimizer settings
learning_rate: 0.0002
weight_decay: 1e-12
optimizer_type: adamw
amsgrad: true

num_nodes: ${data.num_nodes}
eval_every_n_steps: 10000
visualization: ${evaluation.visualization}
