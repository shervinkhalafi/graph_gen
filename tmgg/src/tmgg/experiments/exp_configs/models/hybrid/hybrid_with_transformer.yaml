# Hybrid GNN+Transformer model configuration

_target_: tmgg.training.lightning_modules.denoising_module.SingleStepDenoisingModule

model_name: hybrid_sequential

model:
  _target_: tmgg.models.hybrid.create_sequential_model
  gnn_config:
    num_layers: 2
    num_terms: 2
    feature_dim_in: 20
    feature_dim_out: 5
  transformer_config:
    num_layers: 4
    num_heads: 4
    d_k: 10
    d_v: 10
    dropout: 0.0
    bias: true

# Training parameters (inherit from task/denoising.yaml via base_config_denoising)
learning_rate: ${learning_rate}
loss_type: ${loss_type}
weight_decay: ${weight_decay}
optimizer_type: ${optimizer_type}
scheduler_config: ${scheduler_config}
rotation_k: 20

# Noise settings
noise_type: ${data.noise_type}
noise_levels: ${data.noise_levels}
eval_noise_levels: ${eval_noise_levels}
seed: ${seed}
