# Small DiGress SBM model with GNN projections for Q/K/V
#
# Architecture: Scaled-down (4 layers, proportionally reduced dims)
#               with polynomial GNN convolutions for Q/K/V projections
# Optimizer: Official DiGress settings (AdamW + amsgrad, LR=0.0002)

defaults:
  - digress_base
  - _self_

model_config:
  n_layers: 4
  hidden_dims:
    dx: 128
    de: 32
    dy: 32
    n_head: 4
    dim_ffX: 128
    dim_ffE: 32
    dim_ffy: 128
  projection_config:
    use_gnn_q: true
    use_gnn_k: true
    use_gnn_v: true
    gnn_num_terms: 2
  hidden_mlp_dims:
    X: 64
    E: 32
    y: 64

# Official DiGress optimizer settings
learning_rate: 0.0002
weight_decay: 1e-12
optimizer_type: adamw
amsgrad: true
loss_type: "BCEWithLogits"
