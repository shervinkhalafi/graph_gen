# Shared defaults for all DiGress GraphTransformer model configs.
#
# Children override model (architecture) and optionally optimizer
# settings. SBM configs hardcode the DiGress paper optimizer; transformer
# configs interpolate from parent.

_target_: tmgg.training.lightning_modules.denoising_module.SingleStepDenoisingModule

model_name: graph_transformer

model:
  _target_: tmgg.models.digress.transformer_model.GraphTransformer
  input_dims:
    X: 2
    E: 2
    y: 0
  output_dims:
    X: 0
    E: 2
    y: 0
  extra_features:
    _target_: tmgg.models.digress.extra_features.EigenvectorAugmentation
    k: 50

# Training parameters (interpolated from parent by default)
learning_rate: ${learning_rate}
loss_type: ${loss_type}
weight_decay: ${weight_decay}
optimizer_type: ${optimizer_type}
amsgrad: ${amsgrad}
scheduler_config: ${scheduler_config}

# Noise and eval
noise_type: ${data.noise_type}
noise_levels: ${data.noise_levels}
eval_noise_levels: ${eval_noise_levels}
seed: ${seed}
