# Grid search experiments
#
# Step counts are computed via the epochs_to_steps(num_samples, batch_size,
# epochs) resolver. For SBM with fixed block_sizes the training dataset
# length equals num_samples_per_graph; with grid_gaussian defaults (2000
# samples, batch 32) that gives ceil(2000/32) = 63 steps/epoch. Non-SBM
# datasets compute training size differently (num_graphs * train_fraction)
# and would need adjusted resolver arguments.

defaults:
  - base_config_denoising
  - models/spectral/filter_bank@model  # Default model, will be overridden
  - override data: grid_gaussian
  - _self_

# Experiment identification
experiment_name: "grid_search_4k_params"
wandb_project: tmgg-grid-search-4k

# Logger: wandb-only (replaces the default tensorboard+wandb from _base_infra).
# Overriding in the config body because Hydra defaults-list overrides cannot match
# entries whose config file uses @package _global_ (all base/logger/*.yaml configs).
logger:
  - wandb:
      project: ${wandb_project}
      name: "${model_name}_${data.noise_type}_lr${learning_rate}_eps${noise_level}"
      tags: ["grid_search", "4k_params", "${model_name}", "${data.noise_type}", "lr_${learning_rate}", "eps_${noise_level}"]
      group: "${model_name}_${data.noise_type}"
      save_dir: ${paths.output_dir}
      entity: ${wandb_entity}
      log_model: false
      offline: false
      notes: "Grid search with ~4k params across architectures"

# Training steps computed from data config (200 epochs, validate every 5)
trainer:
  max_steps: ${epochs_to_steps:${data.samples_per_graph},${data.batch_size},200}
  val_check_interval: ${epochs_to_steps:${data.samples_per_graph},${data.batch_size},5}
  gradient_clip_val: 1.0
  enable_checkpointing: true
  enable_model_summary: true
  enable_progress_bar: true
  deterministic: true

  # Grid-search-specific callbacks (override base callbacks)
  callbacks:
    - _target_: pytorch_lightning.callbacks.EarlyStopping
      monitor: "val/loss"
      patience: 4  # 4 validation checks (20 epochs / 5-epoch val interval)
      mode: "min"
      verbose: false
    - _target_: pytorch_lightning.callbacks.ModelCheckpoint
      monitor: "val/loss"
      mode: "min"
      save_top_k: 3
      save_last: true
      filename: "${experiment_name}-step={step:06d}-val_loss={val/loss:.4f}"

# Override model parameters with data config values
model:
  noise_type: ${data.noise_type}
  noise_levels: ${data.noise_levels}
  seed: ${seed}
  learning_rate: ${learning_rate}

# Evaluation settings (step-based, 50 epochs between visualizations)
evaluation:
  visualization_interval: ${epochs_to_steps:${data.samples_per_graph},${data.batch_size},50}
  final_eval_noise_levels: ${data.noise_levels}

# Grid search parameters (to be swept)
noise_level: 0.1      # Will be overridden
model_name: "unknown" # Will be set based on model choice

# Hydra output directory (version-based for checkpoint resumption)
hydra:
  run:
    dir: outputs/v${tmgg_version:}/grid_search/${model_name}/${data.noise_type}/lr${learning_rate}/eps${noise_level}
  sweep:
    dir: outputs/sweeps/grid_search/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${model_name}_${data.noise_type}_lr${learning_rate}_eps${noise_level}
