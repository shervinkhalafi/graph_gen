# @package data
_target_: tmgg.data.data_modules.molecular.moses.MOSESDataModule
batch_size: 256  # upstream cvignac/DiGress moses.yaml::train.batch_size
num_workers: 4
pin_memory: true
prefetch_factor: 4
seed: 42
cache_root: null
num_nodes_max_static: 30  # MOSES filtered ceiling (Polykovskiy et al. 2018)
pad_to_static_n_max: true  # static-shape batches → torch.compile-friendly
