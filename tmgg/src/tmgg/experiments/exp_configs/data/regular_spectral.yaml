# d-regular graph dataset for spectral denoising experiments

_target_: tmgg.data.GraphDataModule

graph_type: regular

graph_config:
  num_nodes: 50
  # Degree d (d < n, n*d must be even)
  # Sweep: {3, 5, 10}
  d: 3
  num_graphs: 1000
  seed: 42

# Samples per graph (permutations)
samples_per_graph: 100

# Batch size
batch_size: 16

# Data loading
num_workers: 4
pin_memory: true

# Train/val split ratios (remainder goes to test)
train_ratio: 0.7
val_ratio: 0.1

# Noise configuration (interpolated from top-level config)
noise_type: ${noise_type}
noise_levels: ${noise_levels}
