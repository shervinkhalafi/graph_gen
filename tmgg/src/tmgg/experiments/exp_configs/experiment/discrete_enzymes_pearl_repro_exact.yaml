# @package _global_
# DiGress ENZYMES — PEARL extra features, post-fix exact.
# =======================================================
#
# Mirrors ``discrete_enzymes_pearl_repro`` but inherits the four
# upstream-parity deltas from ``discrete_enzymes_vignac_repro_exact``:
# ``dim_ffy=2048``, ``amsgrad=false``, ``seed=0``,
# ``use_upstream_hidden_edge_diagonal=true``.
#
# Replaces ``ExtraFeatures(extra_features_type=all)`` with R-PEARL via
# :class:`PEARLExtraFeatures`, with ``use_cycles: false`` so PEARL is
# the *sole* extra-feature signal — no cycle counts, no spectral
# channels. ENZYMES counterpart to ``discrete_sbm_pearl_repro_exact``.

defaults:
  - discrete_enzymes_vignac_repro_exact
  - _self_

experiment_name: discrete_enzymes_pearl_repro_exact
wandb_project: discrete-enzymes-pearl-repro-exact

model:
  model:
    extra_features:
      _target_: tmgg.models.digress.pearl_extra_features.PEARLExtraFeatures
      max_n_nodes: ${data.num_nodes_max_static}
      pearl_output_dim: 16
      pearl_num_layers: 3
      pearl_mode: random
      pearl_hidden_dim: 64
      pearl_input_samples: 32
      pearl_max_nodes: ${data.num_nodes_max_static}
      # PEARL-only contract: drop the 3 per-node cycle channels and the 4
      # per-graph cycle-global channels that PEARLExtraFeatures emits by
      # default. With this off, ``extra_X = pearl_dim`` and ``extra_y = 1``
      # (only the normalised node count survives on the per-graph side).
      use_cycles: false
