# @package _global_
# DiGress QM9 reproduction (Vignac et al., ICLR 2023, Table 4).

defaults:
  - /data: qm9_digress
  - override /models/discrete@model: discrete_sbm_official
  - _self_

experiment_name: discrete_qm9_digress_repro
wandb_project: discrete-qm9-digress-repro

seed: 0

trainer:
  max_steps: 50000
  val_check_interval: 1000
  check_val_every_n_epoch: null
  gradient_clip_val: null

model:
  eval_every_n_steps: 5000
  num_nodes: 9
  evaluator:
    _target_: tmgg.evaluation.molecular.MolecularEvaluator.for_qm9
  model:
    input_dims: { X: 4, E: 5, y: 0 }
    output_dims: { X: 4, E: 5, y: 0 }
    output_dims_x_class: 4
    output_dims_x_feat: null
    output_dims_e_class: 5
    output_dims_e_feat: null
  # The ``discrete_sbm_official`` model preset defaults
  # ``noise_process.x_classes=2``, ``e_classes=2`` (SBM convention).
  # QM9 has 4 atom types + 5 bond types (no-bond + 4 bond orders); the
  # noise process must match so the empirical marginals
  # (``initialize_from_data``) and the forward / reverse process operate
  # on the same class cardinality the data + model expect. Without this
  # override, ``count_node_classes_sparse`` raises an AssertionError at
  # preflight ("per-node feature dimension 4 disagrees with
  # num_node_classes=2").
  noise_process:
    x_classes: 4
    e_classes: 5
