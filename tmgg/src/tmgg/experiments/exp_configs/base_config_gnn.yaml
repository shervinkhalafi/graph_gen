# GNN denoising: standard GNN model on SBM graphs.
# Inherits: base_config_denoising → _base_infra + task/denoising
# Run: uv run tmgg-gnn
# Override model: uv run tmgg-gnn model=models/gnn/symmetric_gnn

defaults:
  - base_config_denoising
  - models/gnn/standard_gnn@model
  - _self_

experiment_name: "gnn_denoising"
wandb_project: architecture-study
_cli_cmd: tmgg-gnn
