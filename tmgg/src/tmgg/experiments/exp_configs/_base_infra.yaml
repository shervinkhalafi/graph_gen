# Shared training infrastructure for all experiment types
#
# Contains settings that every experiment needs: optimizer, scheduler, seed,
# paths, hydra output, visualization, and spectral logging.
#
# Denoising-specific settings (data config group, noise keys, loss_type) live
# in task/denoising.yaml, composed via base_config_denoising.yaml.
# Generative experiments inherit this file directly, skipping the denoising
# task config entirely.

defaults:
  - base/trainer/default@trainer
  - base/logger: wandb
  - base/callbacks: default
  - base/progress_bar: default
  - _self_

# Experiment identification (overridden by each experiment type)
experiment_name: "tmgg_training"
wandb_project: ???
wandb_entity: graph_denoise_team
# Set true to run pre-training sanity checks (noise, data, model, loss).
# Usage: uv run tmgg-spectral-arch sanity_check=true trainer.max_steps=0
sanity_check: false

# Optimizer settings (per experimental design)
learning_rate: 1e-3
weight_decay: 1e-4
optimizer_type: adamw
amsgrad: false  # PyTorch default; SBM DiGress configs override to true

# Learning rate scheduler.
#
# Default: ``type: none`` — flat LR, matches upstream DiGress, which uses
# no scheduler (parity #38 / D-9). Experiments that want cosine warmup
# opt in explicitly, e.g.:
#
#   scheduler_config:
#     type: cosine_warmup
#     warmup_fraction: 0.02   # 2% of training (~1-2 epochs typical)
#     decay_fraction: 0.8     # LR reaches 0 at 80% of training
#
# The cosine_warmup form uses fractions of total training so it scales
# automatically with batch_size and max_steps.
scheduler_config:
  type: none

# Spectral delta logging (eigenstructure tracking during training)
# Always logs eigengap delta, algebraic connectivity delta,
# eigenvalue drift, and subspace distance for noisy→clean and denoised→clean.
spectral_k: 4  # Number of top eigenvectors for subspace comparison

# DataLoader worker processes (0 = main process only, 4 = good default for
# both local and cloud; Modal containers can override higher via CLI)
num_workers: 4

# Per-worker prefetch buffer depth for DataLoader. PyTorch's default is 2;
# raising to 4 hides ~370 ms/step worth of data-prep latency at the cost of
# a few extra batches buffered in worker memory. Has no effect when
# ``num_workers == 0``. See ``analysis/digress-loss-check/
# vignac-repro-health-check/speedup-options.md §A``. Set to ``2`` to revert
# to PyTorch default.
prefetch_factor: 4

# float32 matmul precision for Ampere+ Tensor Cores. ``"high"`` enables TF32
# for ~2x speedup on residual fp32 matmuls (those not under bf16-mixed
# autocast) with minimal accuracy loss. ``"highest"`` disables TF32 for
# byte-exact fp32 reproducibility. ``"medium"`` is bfloat16-flavoured and
# generally not what you want here. See speedup-options.md §B.
matmul_precision: "high"

# Debug mode for Modal-launched experiments.
#
# Off by default. When ``false`` (production), the Modal container launches
# the training subprocess with ``PYTHONOPTIMIZE=1``, which strips ``assert``
# statements and the contents of ``if __debug__:`` blocks at bytecode-compile
# time. Stripping removes ~50 host-side ``bool(Tensor)`` syncs/step from the
# hot path (defensive asserts in extras, mask-symmetry checks, masked-softmax
# guards, etc.) that are otherwise CUDA-graph / ``torch.compile`` blockers.
# See ``docs/reports/2026-04-28-sync-review/99-synthesis.md`` for the full
# inventory.
#
# Set ``modal_debug=true`` (or ``MODAL_DEBUG=1`` in the wrapper env) to keep
# asserts active when investigating numerical issues on Modal. Has no effect
# on local runs — those follow the parent shell's ``PYTHONOPTIMIZE``.
modal_debug: false

# Random seed for reproducibility
seed: 42

# Training resumption: when true, generate_run_id appends a _fresh_<UTC>
# suffix and Lightning skips checkpoint resume — every run gets its own
# Modal output dir. Default true after the round-1 contamination
# incident in the smallest-config sweep (2026-04-30): when two runs
# computed the same deterministic run_id, the async-eval worker's
# checkpoint-by-step lookup loaded a leftover ckpt from the prior run
# and reported its metrics under the new run's display name. Set false
# explicitly only for genuine continuation runs that need resume
# semantics (e.g. recovering from a transient OOM mid-training).
force_fresh: true

# When true (default), training continues without W&B logging if WANDB_API_KEY
# is unset. Set false to enforce W&B and crash without the key.
allow_no_wandb: true

# Stage identifier for multi-stage experiments (stage1_poc, stage2_validation, etc.)
# Set automatically by stage runners; null when running experiments directly
stage: null

# Evaluation settings shared by generative experiment paths.
evaluation:
  visualization:
    enabled: true
    num_samples: 8

# Paths configuration
# - Local execution: Hydra resolves ${hydra:runtime.output_dir} automatically
# - Remote execution (Modal): config is serialized to YAML and the CLI runner
#   resolves paths via Hydra inside the container
paths:
  output_dir: ${hydra:runtime.output_dir}
  results_dir: ${paths.output_dir}/results

# Hydra output directory (version-based for checkpoint resumption)
hydra:
  run:
    dir: outputs/v${tmgg_version:}/${experiment_name}
  sweep:
    dir: outputs/sweeps/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
