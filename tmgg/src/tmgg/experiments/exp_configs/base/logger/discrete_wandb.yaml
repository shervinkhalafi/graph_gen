# @package _global_

logger:
  - wandb:
      project: ${wandb_project}
      name: ${experiment_name}_T${model.noise_schedule.timesteps}_n${data.num_nodes}_${data.graph_type}
      tags: []
      save_dir: ${paths.output_dir}
      entity: ${wandb_entity}
      log_model: false
  - csv:
      save_dir: ${paths.output_dir}/csv
      name: ${experiment_name}
      version: null
      flush_logs_every_n_steps: 100
