# @package _global_

# Default configuration: TensorBoard on S3/Tigris + WandB
# Missing credentials will gracefully skip that logger
#
# Note on remote execution (Modal):
# For Modal CLI transport, the config is serialized to YAML and passed as-is.
# The CLI runner resolves ${oc.env:...} interpolations at runtime inside the
# Modal container where environment variables are available.

logger:
  - tensorboard:
      save_dir: ${oc.env:TMGG_S3_BUCKET,./tensorboard_logs}/${oc.env:TMGG_S3_PREFIX,""}/tensorboard/${experiment_name}/${now:%Y-%m-%d_%H-%M-%S}
      name: ${experiment_name}
      version: null
      log_graph: false
      default_hp_metric: false
  - wandb:
      project: ${wandb_project}
      name: null  # Derived from run_id programmatically in create_loggers()
      tags: []
      save_dir: ${paths.output_dir}
      entity: ${wandb_entity}
      log_model: false
