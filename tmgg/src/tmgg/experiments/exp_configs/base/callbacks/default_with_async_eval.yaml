# @package _global_
# Callback group that composes the existing default callbacks with the
# async-eval spawn callback.
#
# Use via ``+callbacks=default_with_async_eval`` (note ``+`` because we
# replace the default callback group rather than merge into it). Combined
# with ``callbacks.async_eval_spawn.enabled=true`` and a schedule
# override, this is the entry point for the sweep's async-eval mode.

defaults:
  - default
  - async_eval_spawn
  - _self_
