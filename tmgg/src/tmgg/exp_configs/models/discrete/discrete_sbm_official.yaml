# Official DiGress SBM configuration for discrete diffusion generation
#
# Architecture: Matches the official DiGress SBM config exactly
#   (8 layers, dx=256, n_head=8, dim_ffX=256, dim_ffE=64, dim_ffy=256)
# Optimizer: Official DiGress settings (AdamW + amsgrad, LR=0.0002, weight_decay=1e-12)
# Reference: https://github.com/cvignac/DiGress/blob/main/configs/experiment/sbm.yaml

_target_: tmgg.experiments.discrete_diffusion_generative.lightning_module.DiscreteDiffusionLightningModule

diffusion_steps: 500
transition_type: marginal
lambda_E: 5.0

# Official DiGress optimizer settings
learning_rate: 0.0002
weight_decay: 1e-12
optimizer_type: adamw
amsgrad: true

eval_num_samples: 128
mmd_kernel: gaussian_tv
mmd_sigma: 1.0

model:
  _target_: tmgg.models.digress.discrete_transformer.DiscreteGraphTransformer
  n_layers: 8
  input_dims: { X: 2, E: 2, y: 1 }
  hidden_mlp_dims: { X: 128, E: 64, y: 128 }
  hidden_dims:
    dx: 256
    de: 64
    dy: 64
    n_head: 8
    dim_ffX: 256
    dim_ffE: 64
    dim_ffy: 256
  output_dims: { X: 2, E: 2, y: 0 }

noise_schedule:
  _target_: tmgg.models.digress.noise_schedule.PredefinedNoiseScheduleDiscrete
  noise_schedule: cosine
  timesteps: 500
