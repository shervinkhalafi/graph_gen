# Discrete diffusion with eigenvector node embeddings
#
# Same diffusion mathematics as vanilla (categorical transitions on edges),
# but the transformer also receives top-k eigenvectors extracted from the
# noisy adjacency at each step, concatenated with the one-hot node features.
# This tests whether spectral information improves generative quality.
#
# input_dims.X = 2 (one-hot) + 50 (eigenvectors) = 52

_target_: tmgg.experiments.discrete_diffusion_generative.lightning_module.DiscreteDiffusionLightningModule

diffusion_steps: 500
transition_type: marginal
lambda_E: 5.0
learning_rate: ${learning_rate}
weight_decay: ${weight_decay}
optimizer_type: ${optimizer_type}
eval_num_samples: 128
mmd_kernel: gaussian_tv
mmd_sigma: 1.0

model:
  _target_: tmgg.models.digress.discrete_transformer.DiscreteGraphTransformer
  n_layers: 8
  use_eigenvectors: true
  k: 50
  input_dims: { X: 52, E: 2, y: 1 }   # X = 2 (one-hot) + 50 (eigenvectors)
  hidden_mlp_dims: { X: 128, E: 64, y: 128 }
  hidden_dims:
    dx: 256
    de: 64
    dy: 64
    n_head: 8
    dim_ffX: 256
    dim_ffE: 64
    dim_ffy: 256
  output_dims: { X: 2, E: 2, y: 0 }

noise_schedule:
  _target_: tmgg.models.digress.noise_schedule.PredefinedNoiseScheduleDiscrete
  noise_schedule: cosine
  timesteps: 500
