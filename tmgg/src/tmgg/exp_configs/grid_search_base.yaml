# Base configuration for grid search experiments
#
# Inherits shared training settings from base_config_training.yaml
# Use with Hydra multirun to sweep hyperparameters.
#
# Step conversion notes (from original epoch-based config):
#   Assumed ~31 steps/epoch (1000 graphs, batch_size 32).
#   max_epochs=200 -> max_steps=6000 (rounded from 6200)
#   check_val_every_n_epoch=5 -> val_check_interval=150 (rounded from 155)
#   visualization_epochs=50 -> visualization_interval=1500 (rounded from 1550)
#   early_stopping patience=20 epochs / 5 epoch val interval = 4 val checks (kept)

defaults:
  - base_config_training
  - models/spectral/filter_bank@model  # Default model, will be overridden
  - data: grid_gaussian  # Default data config, will be overridden
  - base/logger/grid_wandb@logger
  - _self_

# Experiment identification
experiment_name: "grid_search_4k_params"
wandb_project: tmgg-grid-search-4k

# Override training steps for grid search (see conversion notes above)
trainer:
  max_steps: 6000
  val_check_interval: 150
  gradient_clip_val: 1.0
  enable_checkpointing: true
  enable_model_summary: true
  enable_progress_bar: true
  deterministic: true

  # Grid-search-specific callbacks (override base callbacks)
  callbacks:
    - _target_: pytorch_lightning.callbacks.EarlyStopping
      monitor: "val/loss"
      patience: 4  # 4 validation checks (was 20 epochs / 5 epoch val interval)
      mode: "min"
      verbose: false
    - _target_: pytorch_lightning.callbacks.ModelCheckpoint
      monitor: "val/loss"
      mode: "min"
      save_top_k: 3
      save_last: true
      filename: "${experiment_name}-step={step:06d}-val_loss={val/loss:.4f}"

# Override model parameters with data config values
model:
  noise_type: ${noise_type}
  noise_levels: ${noise_levels}
  seed: ${seed}
  learning_rate: ${learning_rate}

# Evaluation settings (step-based)
evaluation:
  visualization_interval: 1500
  final_eval_noise_levels: ${data.noise_levels}

# Grid search parameters (to be swept)
noise_level: 0.1      # Will be overridden
model_name: "unknown" # Will be set based on model choice

# Hydra output directory (version-based for checkpoint resumption)
hydra:
  run:
    dir: outputs/v${tmgg_version:}/grid_search/${model_name}/${data.noise_type}/lr${learning_rate}/eps${noise_level}
  sweep:
    dir: outputs/sweeps/grid_search/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${model_name}_${data.noise_type}_lr${learning_rate}_eps${noise_level}
