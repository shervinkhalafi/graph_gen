# Base training configuration for denoising experiments
#
# Inherits shared infrastructure from _base_infra.yaml and adds
# denoising-specific settings: data config group (sbm_default), noise
# parameters, loss type, and the data↔model noise sync.
#
# Individual denoising experiment configs (base_config_digress.yaml, etc.)
# inherit from this file. Generative experiment configs inherit from
# _base_infra.yaml directly, avoiding the denoising data/noise leakage.

defaults:
  - _base_infra
  - data: sbm_default
  - _self_

# Loss function (models output logits, BCEWithLogits applies sigmoid internally)
loss_type: BCEWithLogits

# Noise configuration
noise_type: digress
noise_levels: [0.01, 0.05, 0.1, 0.2, 0.3]
eval_noise_levels: null  # Noise levels for evaluation. null = use noise_levels
fixed_noise_seed: null  # Set to int for constant noise (sanity check mode)

# Sync data module noise config with top-level settings.
# Ensures LightningModule and DataModule hparams agree (Lightning merges them).
data:
  noise_levels: ${noise_levels}
  noise_type: ${noise_type}
