# Base configuration for discrete diffusion graph generation experiments
#
# Inherits shared training settings from base_config_training.yaml.
# The model section uses Hydra's _target_ instantiation to build
# DiscreteGraphTransformer, PredefinedNoiseScheduleDiscrete, and
# SyntheticCategoricalDataModule independently.
#
# Run with: tmgg-discrete-gen
# Override: tmgg-discrete-gen model.diffusion_steps=50 data.num_nodes=20

defaults:
  - base_config_training
  - _self_

# --- Intentional overrides of base_config_training defaults ---
experiment_name: "discrete_diffusion"
wandb_project: discrete-diffusion

# Not used by discrete diffusion (noise is categorical, not additive)
noise_levels: []

# --- Discrete diffusion model ---

model:
  _target_: tmgg.experiments.discrete_diffusion_generative.lightning_module.DiscreteDiffusionLightningModule
  diffusion_steps: 500
  transition_type: marginal
  lambda_E: 5.0
  learning_rate: ${learning_rate}
  weight_decay: ${weight_decay}
  optimizer_type: ${optimizer_type}
  # Evaluation (MMD computed in on_validation_epoch_end)
  eval_num_samples: 128
  mmd_kernel: gaussian_tv
  mmd_sigma: 1.0
  # Extra features: uncomment to enable structural augmentation.
  # When enabled, adjust model.model.input_dims to account for extra
  # feature widths (use extra_features_dims() to compute offsets):
  #   cycles:      input_dims.X += 3, input_dims.y += 5
  #   eigenvalues: input_dims.X += 3, input_dims.y += 11
  #   all:         input_dims.X += 6, input_dims.y += 11
  # extra_features:
  #   _target_: tmgg.models.digress.extra_features.ExtraFeatures
  #   extra_features_type: "all"
  #   max_n_nodes: ${data.num_nodes}
  # Denoising backbone
  model:
    _target_: tmgg.models.digress.discrete_transformer.DiscreteGraphTransformer
    n_layers: 5
    input_dims:
      X: 2   # node present / absent
      E: 2   # edge present / absent
      y: 1   # global conditioning placeholder
    hidden_mlp_dims:
      X: 256
      E: 128
      y: 128
    hidden_dims:
      dx: 256
      de: 64
      dy: 64
      n_head: 8
    output_dims:
      X: 2
      E: 2
      y: 0
  noise_schedule:
    _target_: tmgg.models.digress.noise_schedule.PredefinedNoiseScheduleDiscrete
    noise_schedule: cosine
    timesteps: ${model.diffusion_steps}

# --- Data ---

data:
  _target_: tmgg.experiments.discrete_diffusion_generative.datamodule.SyntheticCategoricalDataModule
  dataset_type: sbm
  num_nodes: 20
  num_graphs: 2000
  train_ratio: 0.8
  val_ratio: 0.1
  batch_size: 32
  num_workers: 0
  seed: ${seed}
  dataset_config:
    num_blocks: 2
    p_in: 0.7
    p_out: 0.1

# --- Override callbacks: monitor val/epoch_NLL instead of val/loss ---

callbacks:
  early_stopping:
    monitor: val/epoch_NLL
    mode: min
    patience: 10
    min_delta: 1e-4
  checkpoint:
    monitor: val/epoch_NLL
    mode: min
    save_top_k: 3
    save_last: true
    filename: "model-step={step:06d}-val_nll={val/epoch_NLL:.4f}"
    auto_insert_metric_name: false
    every_n_train_steps: null

# --- Override logger: wandb name without model_type ---

logger:
  - tensorboard:
      save_dir: s3://${oc.env:TMGG_S3_BUCKET}/${oc.env:TMGG_S3_PREFIX,""}/tensorboard/${experiment_name}/${now:%Y-%m-%d_%H-%M-%S}
      name: ${experiment_name}
      version: null
      log_graph: false
      default_hp_metric: false
  - wandb:
      project: ${wandb_project}
      name: ${experiment_name}_T${model.diffusion_steps}_n${data.num_nodes}_${data.dataset_type}
      tags: []
      save_dir: ${paths.output_dir}
      entity: ${wandb_entity}
      log_model: false

# --- Output directories ---

hydra:
  run:
    dir: outputs/discrete_diffusion/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: outputs/discrete_diffusion/sweeps/${now:%Y-%m-%d}/${now:%H-%M-%S}
