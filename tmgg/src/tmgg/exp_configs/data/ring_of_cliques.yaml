# Ring of cliques graph dataset for spectral denoising experiments

_target_: tmgg.experiment_utils.data.data_module.GraphDataModule

graph_type: ring_of_cliques

graph_config:
  num_nodes: 20   # Determined by num_cliques * clique_size
  num_cliques: 4
  clique_size: 5  # Total nodes = 4 * 5 = 20
  num_graphs: 1000
  seed: 42

# Samples per graph (permutations)
samples_per_graph: 100

# Batch size
batch_size: 16

# Data loading
num_workers: 4
pin_memory: true

# Train/val split ratios (remainder goes to test)
train_ratio: 0.7
val_ratio: 0.1

# Noise levels for evaluation
noise_levels: ${noise_levels}
