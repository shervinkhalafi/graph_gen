# @package data
_target_: tmgg.experiment_utils.data.GraphDataModule
graph_type: nx
graph_config:
  clsname: nx_square # Square grid graphs
  N_nodes: 25 # Will create a 5x5 grid
  repeat: 100

# Data module settings
samples_per_graph: 1000
batch_size: 32
num_workers: 4
pin_memory: true
train_ratio: 0.6
val_ratio: 0.2
noise_levels: [0.01, 0.05, 0.1, 0.2, 0.3]
noise_type: "Digress"

