# Tach module boundary configuration
# Goal: Protect infrastructure from accidental LLM edits while allowing
# rapid research iteration on models/experiments

exclude = [
    "**/__pycache__",
    "**/*egg-info",
    "**/docs",
    "**/tests",
    "**/venv",
    "**/.venv",
]

source_roots = ["src"]

# ============================================================
# INFRASTRUCTURE MODULES (protected, explicit dependencies)
# ============================================================

[[modules]]
path = "tmgg.data"
depends_on = []
# Data loading - no dependencies on other tmgg modules

[[modules]]
path = "tmgg.modal"
depends_on = [
    "tmgg.experiments._shared_utils.orchestration",  # Uses run_experiment, generate_run_id
    "tmgg.experiments",             # Evaluation function uses datamodule and checkpoint utils
]
# Modal platform integration - depends on cloud abstraction and run_experiment

# ============================================================
# SHARED UTILITIES (semi-protected)
# ============================================================

[[modules]]
path = "tmgg.experiments._shared_utils"
depends_on = [
    "tmgg.experiments._shared_utils.spectral_utils",
    "tmgg.experiments._shared_utils.evaluation_metrics",
    "tmgg.experiments._shared_utils.lightning_modules",
    "tmgg.experiments._shared_utils.orchestration",
    "tmgg.data",
]
# Top-level: re-exports + cross-cutting files (logging.py, plotting.py, exceptions.py)

[[modules]]
path = "tmgg.experiments._shared_utils.spectral_utils"
depends_on = []
# Pure linear algebra — no framework deps

[[modules]]
path = "tmgg.experiments._shared_utils.evaluation_metrics"
depends_on = [
    "tmgg.data",
]
# reference_graphs.py uses tmgg.data

[[modules]]
path = "tmgg.experiments._shared_utils.lightning_modules"
depends_on = [
    "tmgg.experiments._shared_utils",
    "tmgg.experiments._shared_utils.spectral_utils",
    "tmgg.experiments._shared_utils.evaluation_metrics",
    "tmgg.data", "tmgg.models", "tmgg.diffusion",
]
# PL modules use top-level logging.py/exceptions.py + spectral + evaluation + framework

[[modules]]
path = "tmgg.experiments._shared_utils.orchestration"
depends_on = [
    "tmgg.experiments._shared_utils",
    "tmgg.data",
]
# Uses top-level logging.py; hydra instantiation uses tmgg.data

[[modules]]
path = "tmgg.diffusion"
depends_on = ["tmgg.data", "tmgg.models"]
# Diffusion components (noise processes, samplers, schedules)

# ============================================================
# RESEARCH MODULES (unchecked for rapid iteration)
# ============================================================

[[modules]]
path = "tmgg.models"
depends_on = ["tmgg.data"]
unchecked = true
# Model architectures - imports GraphData from tmgg.data

[[modules]]
path = "tmgg.experiments"
depends_on = []
unchecked = true
# Experiment runners - change frequently, no boundary enforcement
