# @package _global_
# DiGress SBM repro variant — PEARL extra features + spectral
# attention projections.
#
# Stacks the R-PEARL ``ExtraFeatures`` swap (from
# ``discrete_sbm_pearl_repro``) with the existing
# ``digress_transformer_spectral_all.yaml`` pattern of using
# :class:`SpectralProjectionLayer` for Q/K/V instead of plain ``Linear``.
# Two independent positional-encoding mechanisms run in concert:
#
# 1. **R-PEARL extra features**: per-node embedding via GNN message
#    passing on the random-feature initialisation, concatenated to
#    each node's input features (no eigh).
# 2. **Spectral attention projections**: Q/K/V are computed via
#    ``SpectralProjectionLayer`` which DOES compute the Laplacian
#    eigendecomposition of the noised adjacency at every step. The
#    extra cost is the model's choice — this variant trades the
#    no-eigh win of PEARL-only for richer attention conditioning.
#
# Use this overlay when you want to test whether spectral attention
# is complementary to PEARL positional encoding, vs PEARL-only being
# enough on its own.

defaults:
  - discrete_sbm_pearl_repro
  - _self_

experiment_name: discrete_sbm_pearl_spectral_repro
wandb_project: discrete-sbm-pearl-spectral-repro

model:
  model:
    # Switch attention Q/K/V from ``Linear`` to ``SpectralProjectionLayer``.
    # Mirrors ``models/digress/digress_transformer_spectral_all.yaml``.
    projection_config:
      use_spectral_q: true
      use_spectral_k: true
      use_spectral_v: true
      spectral_k: 16            # number of eigenpairs used per projection
      spectral_num_terms: 3     # polynomial expansion order
      spectral_normalize_eigenvalues: true
