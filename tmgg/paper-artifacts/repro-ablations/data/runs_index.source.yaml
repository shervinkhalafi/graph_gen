# runs_index.source.yaml
# Hand-maintained source-of-truth for run lineage, variant labels, and
# qualitative health flags. Refresh script (scripts/refresh.py) merges
# this with wandb-derived metadata to build runs_index.csv.
#
# Update protocol: when a new run launches, add a stub entry here with
# at least {run_id, dataset, variant, postfix, config_name,
# parent_run_id, continuation_type, health, notes}. Refresh.py fills the
# rest from wandb. See HOW-TO-UPDATE.md.

