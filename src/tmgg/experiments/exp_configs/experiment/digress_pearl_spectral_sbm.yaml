# @package _global_
# DiGress SBM — PEARL extra features + spectral attention, post-fix exact.
# ========================================================================
#
# Stacks the spectral-attention swap on top of
# ``digress_pearl_sbm`` (which already carries the four
# upstream-parity deltas: ``dim_ffy=2048``, ``amsgrad=false``,
# ``seed=0``, ``use_upstream_hidden_edge_diagonal=true``). Counterpart
# to the pearl-spectral variant for re-running the panel
# after the hidden-edge-diagonal fix (commit f4f9665a).

defaults:
  - digress_pearl_sbm
  - _self_

experiment_name: digress_pearl_spectral_sbm
wandb_project: digress-pearl-spectral-sbm

model:
  model:
    projection_config:
      use_spectral_q: true
      use_spectral_k: true
      use_spectral_v: true
      spectral_k: 16
      spectral_num_terms: 3
      spectral_normalize_eigenvalues: true
