# @package _global_
# DiGress baseline on PyG ENZYMES (paper Table 2, cell A — ENZYMES)
# =================================================================
#
# Mirror of ``digress_sbm`` but on the PyG TUDataset ENZYMES split. We
# keep the upstream-DiGress SBM architecture verbatim (8 layers,
# dx=256, T=1000, marginal transitions, K=1 abstract-node) and adopt
# the same step-based schedule + val cadence as the SBM repro. ENZYMES
# has n ∈ [2, 126] — well inside the memory envelope of the SBM-tuned
# architecture (SPECTRE-SBM tops at n=187), so batch_size=12 fits on
# A100-40GB without filtering.
#
# Caveat: the ``GraphEvaluator`` Wald test the ``discrete_sbm_official``
# config wires up is SBM-specific and not meaningful here; the dummy
# ``eval_meta`` values just satisfy the Hydra interpolation.
# Degree/clustering/orbit MMD remain meaningful.
#
# Invocation:
#
#   tmgg-discrete-gen +experiment=digress_enzymes

defaults:
  - /data: pyg_enzymes
  - override /models/discrete@model: discrete_sbm_official
  - _self_

experiment_name: digress_enzymes
wandb_project: digress-enzymes

seed: 0

data:
  batch_size: 12
  num_nodes_max_static: 126
  eval_meta:
    p_intra: 0.3
    p_inter: 0.005

trainer:
  max_steps: 550000
  val_check_interval: 5000
  check_val_every_n_epoch: null
  gradient_clip_val: null
  gradient_clip_algorithm: norm

model:
  amsgrad: false
  eval_every_n_steps: 75000
  model:
    input_dims: { X: 1, E: 2, y: 0 }
    output_dims: { X: 1, E: 2, y: 0 }
    output_dims_x_class: 1
    output_dims_x_feat: null
    output_dims_e_class: 2
    output_dims_e_feat: null
    use_upstream_hidden_edge_diagonal: true
    extra_features:
      _target_: tmgg.models.digress.extra_features.ExtraFeatures
      extra_features_type: all
      max_n_nodes: ${data.num_nodes_max_static}
    hidden_dims:
      dx: 256
      de: 64
      dy: 64
      n_head: 8
      dim_ffX: 256
      dim_ffE: 64
      dim_ffy: 2048
  noise_process:
    x_classes: 1
    e_classes: 2
