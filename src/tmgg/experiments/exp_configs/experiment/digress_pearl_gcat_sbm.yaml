# @package _global_
# DiGress SBM — PEARL extra features + BareGraphConv (normalized
# adjacency) Q/K/V projections, post-fix exact.
# ==============================================================
#
# Stacks the gnnconv-normalized swap on top of
# ``digress_pearl_sbm`` (which already carries the four
# upstream-parity deltas: ``dim_ffy=2048``, ``amsgrad=false``,
# ``seed=0``, ``use_upstream_hidden_edge_diagonal=true``). Counterpart
# to the pearl-gcat variant for re-running the panel
# after the hidden-edge-diagonal fix (commit f4f9665a).
#
# Polynomial in symmetrically normalized adjacency
# (``D^{-1/2} A D^{-1/2}``) — same expressive class as the spectral
# variant (``polynomial in spectrum``), but no eigh during attention.

defaults:
  - digress_pearl_sbm
  - _self_

experiment_name: digress_pearl_gcat_sbm
wandb_project: digress-pearl-gcat-sbm

model:
  model:
    projection_config:
      use_gnn_q: true
      use_gnn_k: true
      use_gnn_v: true
      gnn_normalize_adj: true
      gnn_num_terms: 3
