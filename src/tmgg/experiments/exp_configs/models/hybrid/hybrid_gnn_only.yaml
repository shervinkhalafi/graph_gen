# Hybrid model with GNN only (no transformer denoising)

_target_: tmgg.training.lightning_modules.denoising_module.SingleStepDenoisingModule

model_name: hybrid_sequential

model:
  _target_: tmgg.models.hybrid.create_sequential_model
  gnn_config:
    num_layers: 2
    num_terms: 2
    feature_dim_in: 20
    feature_dim_out: 5
  transformer_config: null
  # Wave 7/8 architecture contract: split-field output dims and edge_source selector.
  # Denoising default: read E_feat, write E_feat with a single scalar channel.
  edge_source: feat
  output_dims_x_class: null
  output_dims_x_feat: null
  output_dims_e_class: null
  output_dims_e_feat: 1

# Training parameters
learning_rate: ${learning_rate}
loss_type: ${loss_type}
weight_decay: ${weight_decay}
optimizer_type: ${optimizer_type}
scheduler_config: ${scheduler_config}
rotation_k: 20

# Noise settings
noise_type: ${noise_type}
noise_levels: ${noise_levels}
eval_noise_levels: ${eval_noise_levels}
seed: ${seed}
