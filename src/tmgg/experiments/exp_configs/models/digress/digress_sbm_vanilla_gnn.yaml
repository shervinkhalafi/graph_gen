# Full-size DiGress SBM model with GNN projections for Q/K/V
#
# Architecture: Official DiGress SBM dims (8 layers, dx=256, n_head=8)
#               with polynomial GNN convolutions for Q/K/V projections
# Optimizer: Official DiGress settings (AdamW + amsgrad, LR=0.0002)

defaults:
  - digress_base
  - _self_

model:
  n_layers: 8
  hidden_dims:
    dx: 256
    de: 64
    dy: 64
    n_head: 8
    dim_ffX: 256
    dim_ffE: 64
    dim_ffy: 256
  projection_config:
    use_gnn_q: true
    use_gnn_k: true
    use_gnn_v: true
    gnn_num_terms: 2
  hidden_mlp_dims:
    X: 128
    E: 64
    y: 128

# Official DiGress optimizer settings
learning_rate: 0.0002
weight_decay: 1e-12
optimizer_type: adamw
amsgrad: true
loss_type: "bce_logits"
