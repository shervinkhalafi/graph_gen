# Linear/MLP baseline denoising on SBM graphs.
# Inherits: base_config_denoising → _base_infra + task/denoising
# Run: uv run tmgg-baseline

defaults:
  - base_config_denoising
  - models/baselines/linear@model
  - _self_

experiment_name: "baseline_denoising"
wandb_project: architecture-study
_cli_cmd: tmgg-baseline

# Preserve prior cosine-warmup behaviour after _base_infra default flipped
# to ``type: none`` (parity #38 / D-9). Denoising experiments use warmup
# unless explicitly disabled per-run.
scheduler_config:
  type: cosine_warmup
  warmup_fraction: 0.02
  decay_fraction: 0.8
