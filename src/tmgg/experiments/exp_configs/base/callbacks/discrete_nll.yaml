# @package _global_
# Discrete diffusion monitors validation epoch NLL rather than val/loss.

callbacks:
  early_stopping:
    monitor: val/epoch_NLL
    mode: min
    # Divergence vs upstream DiGress (no ES callback at all); set very high
    # to approximate upstream's "train to budget" behaviour while retaining
    # a safety net.
    patience: 1000
    min_delta: 1e-4
  checkpoint:
    monitor: val/epoch_NLL
    mode: min
    save_top_k: -1  # Keep all checkpoints to support D-16c evaluate_all_checkpoints
    save_last: true
    filename: "model-step={step:06d}-val_nll={val/epoch_NLL:.4f}"
    auto_insert_metric_name: false
    every_n_train_steps: null
