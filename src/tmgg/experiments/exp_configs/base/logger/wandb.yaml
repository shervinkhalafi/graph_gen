# @package _global_

logger:
  - wandb:
      project: ${wandb_project}
      name: null  # Derived from run_id programmatically in create_loggers()
      tags: []
      save_dir: ${paths.output_dir}
      entity: ${wandb_entity}
      log_model: false  # Whether to log model checkpoints to wandb
  - csv:
      save_dir: ${paths.output_dir}/csv
      name: ${experiment_name}
      version: null
      flush_logs_every_n_steps: 100
