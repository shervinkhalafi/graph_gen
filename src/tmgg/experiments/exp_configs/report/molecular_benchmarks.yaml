# T7: Molecular Benchmarks Report
# Evaluates generative quality on molecular graph datasets.
defaults:
  - /paths: default

report:
  type: molecular_benchmarks
  data:
    checkpoints: []  # Must be overridden at invocation
    datasets: [qm9]  # guacamol, moses require additional setup
  evaluation:
    num_samples: 1000
    device: cuda
    seed: 42
  output:
    dir: ${paths.reports}/t7_molecular
