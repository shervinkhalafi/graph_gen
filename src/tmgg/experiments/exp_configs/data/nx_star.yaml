# @package data
_target_: tmgg.data.GraphDataModule
graph_type: star
graph_config:
  # Legacy "nx_star" preset, expressed through the current graph generator API.
  num_nodes: 15  # Fifteen leaves gives a 16-node star including the center.
  num_graphs: 100

# Data module settings
samples_per_graph: 1000
batch_size: 32
num_workers: 4
pin_memory: true
train_ratio: 0.6
val_ratio: 0.2
