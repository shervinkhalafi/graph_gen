# @package _global_
# DiGress SBM — PEARL extra features, post-fix exact.
# ===================================================
#
# Mirrors the pearl variant but inherits the four upstream-
# parity deltas from ``digress_sbm``:
# ``dim_ffy=2048``, ``amsgrad=false``, ``seed=0``,
# ``use_upstream_hidden_edge_diagonal=true``.
#
# Replaces the ``ExtraFeatures`` block (cycle counts + Laplacian
# eigenvalue features) with R-PEARL via :class:`PEARLExtraFeatures`.
# Runs the ablation against ``digress_sbm`` cleanly
# under post-fix architecture: identical training pipeline minus the
# spectral feature path.

defaults:
  - digress_sbm
  - _self_

experiment_name: digress_pearl_sbm
wandb_project: digress-pearl-sbm

model:
  model:
    extra_features:
      _target_: tmgg.models.digress.pearl_extra_features.PEARLExtraFeatures
      max_n_nodes: ${data.num_nodes_max_static}
      pearl_output_dim: 16
      pearl_num_layers: 3
      pearl_mode: random
      pearl_hidden_dim: 64
      pearl_input_samples: 32
      pearl_max_nodes: ${data.num_nodes_max_static}
