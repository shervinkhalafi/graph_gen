# @package _global_
# DiGress ENZYMES — PEARL extra features, post-fix exact.
# =======================================================
#
# Mirrors the pearl variant but inherits the four
# upstream-parity deltas from ``digress_enzymes``:
# ``dim_ffy=2048``, ``amsgrad=false``, ``seed=0``,
# ``use_upstream_hidden_edge_diagonal=true``.
#
# Replaces ``ExtraFeatures(extra_features_type=all)`` with R-PEARL via
# :class:`PEARLExtraFeatures`. ENZYMES counterpart to
# ``digress_pearl_sbm``.

defaults:
  - digress_enzymes
  - _self_

experiment_name: digress_pearl_enzymes
wandb_project: digress-pearl-enzymes

model:
  model:
    extra_features:
      _target_: tmgg.models.digress.pearl_extra_features.PEARLExtraFeatures
      max_n_nodes: ${data.num_nodes_max_static}
      pearl_output_dim: 16
      pearl_num_layers: 3
      pearl_mode: random
      pearl_hidden_dim: 64
      pearl_input_samples: 32
      pearl_max_nodes: ${data.num_nodes_max_static}
