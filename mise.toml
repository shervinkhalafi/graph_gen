[tools]
python = "3.12"
uv = "latest"

[env]
# Ensure uv uses the mise-managed Python.
UV_PYTHON_PREFERENCE = "managed"

[tasks.setup]
description = "Sync project dependencies via uv (matches uv.lock)."
run = "uv sync"

[tasks.repro]
description = "Launch the DiGress repro panel (Table 2). Requires Modal + WANDB_API_KEY. Pass dataset key as argument: sbm | sbm-pearl | sbm-pearl-spectral | sbm-pearl-gnnconv-norm | enzymes | enzymes-pearl | enzymes-pearl-spectral | enzymes-pearl-gnnconv-norm."
run = "./scripts/run-digress-repro-modal.zsh"
